# Анимация может взаимодействовать только с элементами своего слоя, однако она может перекрывать предметы первого слоя.
animation: &anim
  - tick: 0 # на каком тике анимации следует применить этот фрейм, если не указать, то будет на один больше, чем предыдущий
    opcodes:
      - fill: itemID # устанавливает предмет во все слоты меню
      - set: itemID 13 # устанавливает предмет в указанный слот
      - set: itemID 10-20 # устанавливает предмет в указанные слоты
      - set: AIR 10-20 # удаляет предметы в указанных слотах
      - set-if-empty: AIR 10-20 # устанавливает предмет только в пустые слоты
      - remove: 10-20 # аналогично set: AIR 10-20
      - remove-if-not-empty: 10-20 # удаляет предмет из слоя анимации если на основном слое есть предмет
      - move: 13 14 # перемещает предмет из слота 13 в слот 14, в слот 13 устанавливается AIR
      - move: 10-15 20-25 # перемещает предметы из слотов 10-15 в слоты 20-25
      - move: 13++ # перемещает предмет из слота 13 в слот 14
      - move: 13++ # перемещает предмет из слота 13 в слот 14
      - move: 13,17 15,20 # перемещает предметы из слотов 13 и 17 в слоты 15 и 20
      - swap: 10 11 # меняет местами предметы в слотах 10 и 11
      - swap: 10++ # меняет местами предметы в слотах 10 и 11
      - swap: 10-- # меняет местами предметы в слотах 10 и 9
      - swap: 10-15 20-25 # меняет местами предметы в слотах 10-15 и 20-25
      - copy: 10 11 # копирует предмет из слота 10 в слот 11
      - copy: 10++ # копирует предмет из слота 10 в слот 11
      - copy: 10-- # копирует предмет из слота 10 в слот 9
      - copy: 10-15 20-25 # копирует предметы из слотов 10-15 в слоты 20-25
      - copy-from-base: 10-15 20-25 # копирует предметы из основного слоя на слой анимации
      - goto: 13 # переходит к указанному тику, позволяет зациклить анимацию
      - sound: ui.button.click  1.0 1.0
      - commands: *modern_commands
      - title: title # устанавливает title меню
      - copy-from-base: 10-10 10-10 # скопирует предметы из основного слоя на слой анимации
      - set-if-empty: item 10-10 # установит предмет в слот только если слот пустой
# Алиасы к опкодам
# set -> st
# remove -> rm
# move -> mv
# swap -> sw
# copy -> cl
# goto -> gt
# sound -> snd
# commands -> cmd
# title -> ttl
# fill -> fl
# remove-if-not-empty -> rne
# set-if-empty -> sie
# copy-from-base -> cfb
# copy-from-base -> cfb
# set-if-empty -> sie
animations:
  default: *anim
  other: *anim

# rebuild_slots copy_from_previous_menu rebuild reopen refresh
# Все команды
# Аргумент в начале которого ? не обязательный
# Команды могут быть записаны так
# message: '&aMsg'
# '[message] &aMsg'
# Если команда без аргументов то пишется так close: '' или '[close]'
commands:
  ### Сообщения и вывод
  - '&7Просто сообщение'
  - message: '&7Тоже сообщение'
  - sound: <sound> <?volume> <?pitch> # воспроизведёт звук
  - title_all: '<"Title\nSubTitle"> <?fadeIn> <?stay> <?fadeOut>'
  - set_title: '&7Title'
  - title: '<"Title\nSubTitle"> <?fadeIn> <?stay> <?fadeOut>'
  - action_bar_all: '<msg>'
  - action_bar: '<msg>'
  - broadcast: '<msg>'
  ### Выполнение команд
  - console: 'op %player_name%' # выполнить команду от имени сервера
  - player: 'msg _By1337_ привет?' # выполнить команду от имени игрока
  - chat: '/rtp' # Отправит сообщение от имени игрока, если в начале будет / то будет как команда
  ### Навигация по меню
  # В commands вы можете передать список команд которые необходимо выполнить в открывающейся менюшке
  # Синтаксис [open] menu ["[message] сообщение из открытого меню", "[что-то] некст команда"]
  - open: '<menu:id> <?commands>'
  - close: '' # закроет меню
  - back: '<?commands>' # вернутся в прошлое меню
  - back_or_close: '<?commands>' # вернутся в прошлое меню если есть
  - back_to_or_close: '<menu:id> <?commands>' # вернутся в <menu:id> если было открыто ранее
  - back_or_open: '<menu:id> <?commands>' # вернутся в <menu:id> если было открыто иначе открыть <menu:id>
  ### Экономика и сервер
  - connect: '<server>' # подключает игрока к серверу
  - givemoney: '<count>' # выдать монеты
  - takemoney: '<count>' # снять монеты
  ### Управление предметами
  # <slots> - указывается как '10' или '0-10' или '0-10,30-40,50'
  - update: '' # обновляет предмет выполнивший эту команду
  - update_slots: '<slots>' # обновляет предметы в слотах
  - die: '' # удаляет предмет выполнивший эту команду
  - die_slots: '<slots>' # удаляет предметы в слотах
  - layer: '<layer> set <item> <slots>'
  - layer: '<layer> remove <slots>'
  - layer: '<layer> move <layer2> <from> <to>'
  - layer: '<layer> copy <layer2> <from> <to>'
  - layer: '<layer> clear'
  ### Анимации
  - set_animation: '<animation>' # устанавливает анимацию из animations
  - animation_tick: '' # принудительно вызывает тик анимации
  - animation_force_end: '' # моментально завершает анимацию
  ### Аргументы меню
  - set_param: '<arg> <value>' # меняет значения в args
  - import_params: '<item>' # копирует args из предмета в args меню
  ### Выполнение команд меню
  - run: '<id>' # выполняет список команд из commands-list
  - run_rand: '' # выполняет случайных список команд из commands-list
  - delay: '<delay> <cmd>' # выполнить команду с задержкой например [delay] 20 [message] &aЭто сообщение отправилось спустя 1 секунду!
