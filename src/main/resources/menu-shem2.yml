
extends:
  - ./file.yml # путь относительно текущей папки
  - ../file.yml # путь относительно папки на уровень выше
  - /file.yml  # путь относительно корневой папки с меню

include: [
  "./file.yml",
  "../file.yml",
  "/file.yml",
]
modern_commands: &modern_commands
  - if: '100 == 100'
    do: 'do'
    else: "else"
  - console: 'say okak'

legacy_commands: &legacy_commands
  commands: *modern_commands
  deny_commands: *modern_commands
  requirements:
    - check: '100 + 100 * 100 == 15'
      commands: *modern_commands
      deny_commands: *modern_commands
    - check: '100.5 + 100.5 == 201'
    - check: 'has super.permission' # если у игрока есть пермишен
    - check: '!has super.permission' # если у игрока нет пермишена
    - check: 'string has str' # строка содержит
    - check: 'string !has str' # строка не содержит
    - check: 'string HAS str' # строка содержит без учёта регистра
    - check: 'string !HAS str' # строка не содержит без учёта регистра
    - check: 'string == string' # строка равна
    - check: 'string != string' # строка не равна
    - check: 'nearby world 10 10 10 100' # условие что игрок находится в радиусе 100 блоков от координат 10 10 10 в мире world
      commands:
        - '[message] string != string'
        - '[break]' # Эта команда доступна только в условиях, она прерывает проверку следующих условий и выполнение следующих команд
        - '[close]' # Так как выше команда [BREAK] команда [CLOSE] не будет выполнена


click_cooldown: 100

commands-list:
  example-1:
    weight: 1.0 # Необязательный параметр. Это вес этого набора он будет использоваться если вызвать случайные команды через [RUN_RAND]
    commands: *modern_commands
  example-2:
    weight: 1.0
    commands: *modern_commands

menu-events:
  on_open: *modern_commands #| *legacy_commands
  on_reopen: *modern_commands #| *legacy_commands
  on_close: *modern_commands #| *legacy_commands

id: <namespace>:<id>

provider: <namespace>:<id>
type: chest
size: 27
title: '&7Menu title'
only-open-from:
  - <namespace>:<id>
args:
  PARAM_1: 'value'
  PARAM_2: 'value'
  PARAM_3: 'value'

items:
  itemID:
    material: <material> # или basehead-<value> или плейсхолдер
    name: "Имя предмета"
    amount: 1 # или плейсхолдер
    lore: [ ] # описание
    item_flags: [ ] # все флаги https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/inventory/ItemFlag.html
    all_flags: true # включает все флаги
    potion_contents:
      glowing: 10 10
      slow_falling: <duration> <amplifier>
    color: '#aarrggbb' # для зелий и кожаной брони. Также можно указать без alpha канала #rrggbb (alpha работает с 1.19.4)
    enchantments:
      protection: 1
    unbreakable: true
    model_data: 0
    # с 1.21.5 можно указывать больше параметров в model_data
    $model_data:
      floats:
        - 1.0
      flags:
        - true
      strings:
        - 'str'
      colors:
        - '#rrggbb'
    damage: 10
    priority: 0
    slot: 10
    $slot:
      - '10'
      - '11'
      - '12-20'
    $1-slot: 10-15,20-25,53
    trim: # 1.19.4+
      material: quartz
      pattern: sentry
    hide_tooltip: false # 1.20.5+
    max_stack_size: 64 # 1.20.5+
    args:
      PARAM_1: 'value'
      PARAM_2: 'value'
      PARAM_3: 'value'
    on_view:  *legacy_commands #| *strings
    on_left_click: *modern_commands #| *legacy_commands
    on_right_click: *modern_commands #| *legacy_commands
    on_shift_left_click: *modern_commands #| *legacy_commands
    on_shift_right_click: *modern_commands #| *legacy_commands
    on_middle_click: *modern_commands #| *legacy_commands
    on_drop_click: *modern_commands #| *legacy_commands
    on_click: *modern_commands #| *legacy_commands
    on_number_key_0_click: *modern_commands #| *legacy_commands
    on_number_key_1_click: *modern_commands #| *legacy_commands
    on_number_key_2_click: *modern_commands #| *legacy_commands
    on_number_key_3_click: *modern_commands #| *legacy_commands
    on_number_key_4_click: *modern_commands #| *legacy_commands
    on_number_key_5_click: *modern_commands #| *legacy_commands
    on_number_key_6_click: *modern_commands #| *legacy_commands
    on_number_key_7_click: *modern_commands #| *legacy_commands
    on_number_key_8_click: *modern_commands #| *legacy_commands
    on_swap_offhand_click: *modern_commands #| *legacy_commands
    on_control_drop_click: *modern_commands #| *legacy_commands
