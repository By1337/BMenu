id: example:prem-seller
provider: default
type: chest
size: 45
title: '&7Премиальный селлер'

items-defaults:
  item2: &item
    oneOf:
      - material: '{MATERIAL}'
        name: '{NAME}'
        lore:
          - '&r '
          - '&r &7Нажмите лкм'
          - '&r &7чтобы купить {NAME}&7 за {PRICE_FORMAT} монет'
          - '&r '
        on_view: '{menu_id} == example:prem-seller'
        on_click:
          - if: '%vault_eco_balance_fixed% >= {PRICE}'
            do:
              - open: 'example:prem-seller-confirm'
              - up: '' # команды ниже будут выполняться в открывшемся меню.
              - layer: '0 set -me 13' # устанавливаем текущий предмет в слот 13
              - update: '' # обновим этот предмет чтобы ещё раз on_view проверить
            else: '&cУ Вас не достаточно баланса!'

      - material: '{MATERIAL}'
        name: '{NAME}'
        on_click:
          - if: '%vault_eco_balance_fixed% >= {PRICE}'
            do:
              - takemoney: '{PRICE}'
              - console: 'give %player_name% {MATERIAL} {AMOUNT}'
              - '&aВы успешно купили {NAME}'
              - back: ''
            else: '&cУ Вас не достаточно баланса!'

items:
  gui-lime:
    material: lime_stained_glass_pane
    name: ''
    slot: 0-8,9,18,27,26,36-44,35,17

  totem:
    args:
      MATERIAL: totem_of_undying
      PRICE: 10000
      PRICE_FORMAT: '10,000'
      AMOUNT: 1
      NAME: '&6Тотем'
    <<+: *item
    slot: 21

  elytra:
    args:
      MATERIAL: elytra
      PRICE_FORMAT: '20,000'
      PRICE: 20000
      AMOUNT: 1
      NAME: '&6Элитры'
    <<+: *item
    slot: 23

  creeper:
    args:
      MATERIAL: creeper_spawn_egg
      PRICE_FORMAT: '15,000'
      PRICE: 15000
      AMOUNT: 1
      NAME: '&6Яйцо призыва крипера'
    <<+: *item
    slot: 22
