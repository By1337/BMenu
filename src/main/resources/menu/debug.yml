example:
  modern: # Commands
    if: # remap requirements -> if
      - if: '%vault_eco_balance_fixed% >= ${PRICE}' # remap check -> if
    else: # remap deny_commands -> else
      - message: '&cУ Вас не достаточно баланса!'
      - set_item_to_layer: '{clicked_slot} 0 not_enough_money'
  legacy: # Commands
    requirements:
      - check: '%vault_eco_balance_fixed% >= ${PRICE}'
    deny_commands:
      - message: '&cУ Вас не достаточно баланса!'
      - set_item_to_layer: '{clicked_slot} 0 not_enough_money'
  legacy2:
    requirements: # алиас req
      check: # если условие окажется ложным, то проверка остальных условий прервётся
        type: math
        expression: '100 + 100 == 10 * (5 * 4)'
        deny_commands: [ ] # во всех проверках тоже можно указывать команды
        commands: [ ]
    deny_commands: [ ] # если хотя бы одно из условий окажется ложным
legacy_test:
  on_left_click:
    requirements:
      - check: '{playing} == true'
        commands: 'do {playing}'
        deny_commands: 'else {playing}'
    commands: 'do on_left_click'
    deny_commands: 'else on_left_click'
  on_reght_click:
    requirements:
      check:
        type: math
        expression: '100 + 100 == 10 * (5 * 4)'
        deny_commands: [ ]
        commands: [ ]
      check-1:
        type: string equals
        input: 'str'
        output: 'str'
        commands:
          - '[MESSAGE] str == str'
          - '[BREAK]'
    deny_commands: [ ]
  on_reght_click2:
    requirements: # алиас req
      check: # если условие окажется ложным, то проверка остальных условий прервётся
        type: math
        expression: '100 + 100 == 10 * (5 * 4)'
        deny_commands: [ ] # во всех проверках тоже можно указывать команды
        commands: [ ]
      check-1:
        type: string equals
        input: 'str'
        output: 'str'
        commands:
          - '[MESSAGE] str == str'
          - '[BREAK]' # Эта команда доступна только в условиях, она прерывает проверку следующих условий и выполнение следующих команд
          - '[CLOSE]' # Так как выше команда [BREAK] команда [CLOSE] не будет выполнена
      check-2:
        type: string equals ignorecase
        input: 'str'
        output: 'STR'
      check-3:
        type: string contains
        input: 'str_str_str'
        output: 'str'
      check-4:
        type: regex matches
        regex: '^(str)\d+'
        input: 'str88ing'
      check-5:
        type: has permission
        permission: 'admin.use'
      # Здесь можно выполнить команды в зависимости от результатов условий
      deny_commands: [ ] # если хотя бы одно из условий окажется ложным




