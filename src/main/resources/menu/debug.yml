# replace
# {rand_10} -> {rand:10}
# {rand_100} -> {rand:100}
# {rand_1000} -> {rand:1000}
# {rand_10000} -> {rand:10000}
# {rand_100000} -> {rand:100000}
# math[<>] -> {math:<>}
# ${<>} -> {<>}
# "[set_item_to_layer] <slots> <layer> <item>" -> "[layer] <layer+2> [set] <item> <slots>"
# "[clear_layer] <layer>" -> "[layer] <layer+2> [clear]"

#
id: debug:main
provider: default
type: chest
size: 54
title: '&7Debug Menu'

args:
  REBUILD_TEST: 0
  DAMAGE_TEST: 0
  TEST:
    - 122

menu-events:
  on_refresh:
    commands: '[clear_layer] 0'

items-custom-section: # schema support
  one-line-lore:
    slot: 0
    material: dirt
    lore: '&7one line lore'


items:
  test2:
    oneOf:
      - slot: 10
        material: gold_nugget
        name: '&cУ Вас меньше 100 монет'
        view_requirement:
          requirements:
            - check: '%vault_eco_balance_fixed% < 100'
      - slot: 10
        material: gold_ingot
        name: '&cУ Вас меньше 1000 монет'
        view_requirement:
          requirements:
            - check: '%vault_eco_balance_fixed% < 1000'
      - slot: 10
        material: gold_block
        name: '&cУ Вас больше 1000 монет'

  test:
    oneOf:
      test:
        slot: 10
        material: gold_nugget
        name: '&cУ Вас меньше 100 монет'
        view_requirement:
          requirements:
            - check: '%vault_eco_balance_fixed% < 100'
      test2:
        slot: 10
        material: gold_ingot
        name: '&cУ Вас меньше 1000 монет'
        view_requirement:
          requirements:
            - check: '%vault_eco_balance_fixed% < 1000'
      test3:
        slot: 10
        material: gold_block
        name: '&cУ Вас больше 1000 монет'
  one-line-lore:
    slot: 0
    material: di
    lore: '&7one line lore'

  args-in-args:
    slot: 1
    amount: "1"
    material: dirt
    args:
      TEST: '10'
      TEST1: 'math[${TEST} + 10]'
      TEST2: '${TEST} + ${TEST} = ${TEST1}'
    lore:
      - '&7TEST = ${TEST} (10)'
      - '&7TEST1 = ${TEST1} (20)'
      - '&7TEST2 = ${TEST2} (10 + 10 = 20)'

  multi-line-args:
    slot: 2
    material: dirt
    args:
      LORE:
        - 'line 1'
        - 'line 2'
        - 'line 3'
    lore: '${LORE}'



  static-test:
    slot: 3
    material: dirt
    lore:
      - 'is static line'
      - 'is not static line %placeholder%'
      - 'is not static line {placeholder}'
      - '&7Do Click'
    on_click:
      commands:
        - console: 'op &player_name%'
        - message: '&aDone'
        - update: ''


  rebuild1:
    slot: 4
    name: '&7rebuild 1'
    material: dirt
    lore:
      - '&c REBUILD_TEST is ${REBUILD_TEST}'
    on_click:
      commands:
        - '[set_param] REBUILD_TEST math[${REBUILD_TEST} + 1]'
        - '[update]'
    ticking: false
    on_tick:
      commands: '[rebuild]'


  rebuild2:
    slot: 5
    name: '&7rebuild 2'
    material: dirt
    lore: '&c REBUILD_TEST is ${REBUILD_TEST}'

    on_click:
      commands:
        - '[set_param] REBUILD_TEST math[${REBUILD_TEST} + 1]'
        - '[update]'

  damage-test:
    slot: 6
    material: diamond_pickaxe
    name: "&7Damage test"
    damage: "${DAMAGE_TEST}"
    lore:
      - '&r '
      - '&7 test ${DAMAGE_TEST}'
      - '&r '
    on_click:
      commands:
        - '[set_param] DAMAGE_TEST math[${DAMAGE_TEST} + 20]'
        - '[rebuild_slots] 6,7'

  damage-test2:
    slot: 7
    material: diamond_pickaxe
    name: "&7Damage test"
    damage: "${DAMAGE_TEST}"
    lore:
      - '&r '
      - '&7 test'
      - '&r '

  ticking-test:
    slot: 8
    ticking: true
    material: netherite_pickaxe
    tick_speed: 5
    name: "&7Damage test"
    damage: "${DAMAGE_TEST}"
    lore:
      - '&r '
      - '&7 damage is ${DAMAGE_TEST}'
      - '&r '

  damager-click:
    material: bedrock
    slot: 9
    name: "&aДамагер тест"
    on_click:
      commands:
        - '[set_item_to_layer] 9 0 damager'

  click_me:
    material: knowledge_book
    slot: 20
    name: "&aНажми меня!"
    on_click:
      commands:
        - '[set_item_to_layer] 20 0 banned-item'




  banned-item:
    args:
      TIME: '5' # 5 секунд
    material: barrier
    name: '&cКд math[${TIME} - ${tick}] сек...'
    tick_speed: 20
    on_tick:
      requirements:
        - check: '${tick} == ${TIME}'
          commands: '[die]'
      deny_commands: '[update]'

  damager:
    material: diamond_pickaxe
    name: '&7Дамагер'
    tick_speed: 1
    damage: 'math[${tick} * 16]'
    on_tick:
      requirements:
        - check: '${tick} == 97'
          commands: '[die]'
      deny_commands: '[update]'

  multi_lore_item:
    material: knowledge_book
    slot: 15
    local_args:
      name1: '&7Это страница 1'
      name2: '&7Это страница 2'
      lore1:
        - '&r '
        - '&r &fКакая-то информация'
        - '&r '
        - '&r &7<-----------&a>'
        - '&r '
      lore2:
        - '&r '
        - '&r &fКакая-то информация 2'
        - '&r '
        - '&r &a<&7----------->'
        - '&r '
      current_name: '${name1}'
      current_lore: '${lore1}'
      page: 0
    name: '${current_name}'
    lore: '${current_lore}'
    on_click:
      requirements:
        - check: '${page} == 0'
          commands:
            - '[set_local] current_name ${name2}'
            - '[set_local] current_lore ${lore2}'
            - '[set_local] page 1'
            - '[update]'
          deny_commands:
            - '[set_local] current_name ${name1}'
            - '[set_local] current_lore ${lore1}'
            - '[set_local] page 0'
            - '[update]'